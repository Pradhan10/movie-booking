spring:
  application:
    name: catalog-service
  
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/moviebooking}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 30000
  
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        jdbc:
          batch_size: 20
        order_inserts: true
        order_updates: true
  
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      timeout: 2000ms
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 2

server:
  port: 8081
  servlet:
    context-path: /api/v1

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    enabled: ${SWAGGER_ENABLED:true}

# JWT Configuration
jwt:
  secret: ${JWT_SECRET:your-256-bit-secret-key-change-this-in-production-minimum-32-characters-required}
  expiration: ${JWT_EXPIRATION:86400000}

logging:
  level:
    com.moviebooking.catalog: INFO
    org.hibernate.SQL: INFO

cache:
  ttl:
    show-details: 300
    show-list: 60
    offers: 600
    
---
spring:
  config:
    activate:
      on-profile: dev

logging:
  level:
    com.moviebooking.catalog: DEBUG
    org.hibernate.SQL: DEBUG

---
spring:
  config:
    activate:
      on-profile: prod

springdoc:
  swagger-ui:
    enabled: false  # Disable Swagger in production

logging:
  level:
    com.moviebooking.catalog: INFO
    org.hibernate.SQL: WARN
