spring:
  application:
    name: booking-service
  
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/moviebooking}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 30
      minimum-idle: 10
      connection-timeout: 30000
  
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        jdbc:
          batch_size: 20
        order_inserts: true
        order_updates: true
  
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      timeout: 2000ms
      lettuce:
        pool:
          max-active: 20
          max-idle: 10
          min-idle: 5
  
  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USERNAME:guest}
    password: ${RABBITMQ_PASSWORD:guest}

server:
  port: 8082
  servlet:
    context-path: /api/v1

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    enabled: ${SWAGGER_ENABLED:true}

# JWT Configuration
jwt:
  secret: ${JWT_SECRET:your-256-bit-secret-key-change-this-in-production-minimum-32-characters-required}
  expiration: ${JWT_EXPIRATION:86400000}

logging:
  level:
    root: INFO
    com.moviebooking.booking: INFO
    com.moviebooking.booking.aspect: WARN
    org.hibernate.SQL: WARN
    org.springframework.web: INFO
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] [%X{correlationId:-NO-CID}] %-5level %logger{36} - %msg%n"

booking:
  seat-hold:
    ttl-minutes: 10
    lock-timeout-seconds: 30
  payment:
    gateway-url: ${PAYMENT_GATEWAY_URL:https://api.razorpay.com}
    webhook-secret: ${PAYMENT_WEBHOOK_SECRET:change-this-secret-in-production}
  logging:
    mask-sensitive-data: true
    
---
spring:
  config:
    activate:
      on-profile: dev

logging:
  level:
    root: INFO
    com.moviebooking.booking: DEBUG
    com.moviebooking.booking.aspect: DEBUG
    org.hibernate.SQL: DEBUG
    
---
spring:
  config:
    activate:
      on-profile: prod

springdoc:
  swagger-ui:
    enabled: false  # Disable Swagger in production

logging:
  level:
    root: WARN
    com.moviebooking.booking: INFO
    com.moviebooking.booking.aspect: ERROR
    org.hibernate.SQL: WARN
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%X{correlationId:-NO-CID}] %-5level %logger{36} - %msg%n"
